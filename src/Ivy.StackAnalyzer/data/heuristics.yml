# Content heuristics for extensions claimed by more than one language, ported from
# github-linguist's heuristics.yml (MIT). The Scanning.Heuristics engine consults
# these only when an extension resolves to >1 candidate language. Rules are tried in
# order; the first matching rule's language wins. See THIRD-PARTY-NOTICES.md.
disambiguations:
- extensions: ['.m']
  rules:
  - language: Objective-C
    named_pattern: objectivec
  - language: Mercury
    pattern: ':- module'
  - language: MUF
    pattern: '^: '
  - language: M
    pattern: '^\s*;'
  - language: Wolfram Language
    and:
      - pattern: '\(\*'
      - pattern: '\*\)$'
  - language: MATLAB
    pattern: '^\s*%'
  - language: Limbo
    pattern: '^\w+\s*:\s*module\s*\{'
- extensions: ['.pl']
  rules:
  - language: Prolog
    pattern: '^[^#]*:-'
  - language: Perl
    and:
      - negative_pattern: '^\s*use\s+v6\b'
      - named_pattern: perl
  - language: Raku
    named_pattern: raku
- extensions: ['.v']
  rules:
  - language: Rocq Prover
    pattern: '(?:^|\s)(?:Proof|Qed)\.(?:$|\s)|(?:^|\s)Require[ \t]+(Import|Export)\s'
  - language: Verilog
    pattern: '^[ \t]*module\s+[^\s()]+\s*\#?\(|^[ \t]*`(?:define|ifdef|ifndef|include|timescale|pragma)|^[ \t]*always[ \t]*@|^[ \t]*initial[ \t]*(begin|@)'
  - language: V
    pattern: '\$(?:if|else)[ \t]|^[ \t]*fn\s+[^\s()]+\(.*?\).*?\{|^[ \t]*for\s*\{'
- extensions: ['.h']
  rules:
  - language: Objective-C
    named_pattern: objectivec
  - language: C++
    named_pattern: cpp
  - language: C
- extensions: ['.pro']
  rules:
  - language: Proguard
    pattern: '^-(include\b.*\.pro$|keep\b|keepclassmembers\b|keepattributes\b)'
  - language: Prolog
    pattern: '^[^\[#]+:-'
  - language: INI
    pattern: 'last_client='
  - language: QMake
    and:
    - pattern: HEADERS
    - pattern: SOURCES
  - language: IDL
    pattern: '^\s*(?i:function|pro|compile_opt) \w[ \w,:]*$'
- extensions: ['.cls']
  rules:
  - language: Visual Basic 6.0
    and:
    - named_pattern: vb-class
    - pattern: '^\s*BEGIN(?:\r?\n|\r)\s*MultiUse\s*=.*(?:\r?\n|\r)\s*Persistable\s*='
  - language: VBA
    named_pattern: vb-class
  - language: TeX
    pattern: '^\s*\\(?:NeedsTeXFormat|ProvidesClass)\{'
  - language: ObjectScript
    pattern: '^Class\s'
  - language: OpenEdge ABL
    pattern: '(?i)^\s*(?:end\s+(?:class|interface)\.|(?:class|interface)\s+[a-z_][a-z0-9_#$%&-]*:)'
- extensions: ['.r']
  rules:
  - language: Rebol
    pattern: '(?i:\bRebol\b)'
  - language: Rez
    pattern: '(#include\s+["<](Types\.r|Carbon\/Carbon\.r)[">])|((resource|data|type)\s+''[A-Za-z0-9]{4}''\s+((\(.*\)\s+){0,1}){)'
  - language: R
    pattern: '<-|^\s*#'
- extensions: ['.t']
  rules:
  - language: Perl
    and:
      - negative_pattern: '^\s*use\s+v6\b'
      - named_pattern: perl
  - language: Raku
    pattern: '^\s*(?:use\s+v6\b|\bmodule\b|\bmy\s+class\b)'
  - language: Turing
    pattern: '^\s*%[ \t]+|^\s*var\s+\w+(\s*:\s*\w+)?\s*:=\s*\w+'

named_patterns:
  objectivec: '^\s*(@(interface|class|protocol|property|end|synchronised|selector|implementation)\b|#import\s+.+\.h[">])'
  cpp:
  - '^\s*#\s*include <(cstdint|string|vector|map|list|array|bitset|queue|stack|forward_list|unordered_map|unordered_set|(i|o|io)stream)>'
  - '^\s*template\s*<'
  - '^[ \t]*(try|constexpr)'
  - '^[ \t]*catch\s*\('
  - '^[ \t]*(class|(using[ \t]+)?namespace)\s+\w+'
  - '^[ \t]*(private|public|protected):$'
  - '__has_cpp_attribute|__cplusplus >'
  - 'std::\w+'
  perl:
  - '\buse\s+(?:strict\b|v?5\b)'
  - '^\s*use\s+(?:constant|overload)\b'
  - '^\s*(?:\*|(?:our\s*)?@)EXPORT\s*='
  - '^\s*package\s+[^\W\d]\w*(?:::\w+)*\s*(?:[;{]|\sv?\d)'
  - '[\s$][^\W\d]\w*(?::\w+)*->[a-zA-Z_\[({]'
  raku: '^\s*(?:use\s+v6\b|\bmodule\b|\b(?:my\s+)?class\b)'
  vb-class: '^[ ]*VERSION [0-9]\.[0-9] CLASS'
  vb-form: '^[ ]*VERSION [0-9]\.[0-9]{2}'
