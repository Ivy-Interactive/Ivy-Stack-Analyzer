# Technology detectors (category: testing) seeded from specfy/stack-analyser (MIT).
- id: cypress
  name: Cypress
  category: testing
  match:
    deps:
      - { ecosystem: npm, name: cypress }
      - { ecosystem: npm, name: gatsby-cypress }
      - { ecosystem: rubygems, name: cypress-on-rails }
      - { ecosystem: githubAction, name: cypress-io/github-action }
    depsRegex:
      - { ecosystem: docker, pattern: cypress }
    filesRegex: ["cypress.config.(js|ts|mjs|cjs)"]
  confidence: high
- id: bun-test
  name: bun test
  category: testing
  match:
    # bun's test runner has no dependency or config-file marker; it is wired
    # through package.json scripts (e.g. "test": "bun test").
    scriptsRegex: ['\bbun test\b']
  confidence: high
- id: go-testing
  name: Go testing
  category: testing
  match:
    deps:
      - { ecosystem: go, name: github.com/stretchr/testify }
      - { ecosystem: go, name: github.com/frankban/quicktest }
    filesRegex: ["_test\\.go$"]
  confidence: high
# `.snap` files are shared by many snapshot tools (Jest, Vitest); they are not
# proof of the Rust `insta` crate. Match the cargo dependency only.
- id: insta
  name: insta
  category: testing
  match:
    deps:
      - { ecosystem: cargo, name: insta }
  confidence: high
- id: junit
  name: JUnit
  category: testing
  match:
    deps:
      - { ecosystem: maven, name: "junit:junit" }
      - { ecosystem: maven, name: "io.quarkus:quarkus-junit5" }
    depPrefix:
      - { ecosystem: maven, prefix: "org.junit" }
  confidence: high
- id: jest
  name: Jest
  category: testing
  match:
    deps:
      - { ecosystem: npm, name: jest }
      - { ecosystem: npm, name: babel-jest }
      - { ecosystem: npm, name: jest-cli }
    filesRegex: ["jest.config.(js|ts|mjs|cjs|json)"]
  confidence: high
- id: k6
  name: Grafana K6
  category: testing
  match:
    deps:
      - { ecosystem: npm, name: k6 }
      - { ecosystem: go, name: go.k6.io/xk6/cmd/xk6ver }
      - { ecosystem: docker, name: grafana/k6 }
  confidence: high
- id: lighthouse
  name: Lighthouse
  category: testing
  match:
    deps:
      - { ecosystem: npm, name: lighthouse }
      - { ecosystem: githubAction, name: jakejarvis/lighthouse-action }
      - { ecosystem: githubAction, name: foo-software/lighthouse-check-action }
      - { ecosystem: githubAction, name: treosh/lighthouse-ci-action }
      - { ecosystem: docker, name: femtopixel/google-lighthouse }
  confidence: high
- id: mochajs
  name: Mocha
  category: testing
  match:
    deps:
      - { ecosystem: npm, name: mocha }
    filesRegex: [".mocharc.(js|cjs|json|jsonc|yaml|yml)"]
