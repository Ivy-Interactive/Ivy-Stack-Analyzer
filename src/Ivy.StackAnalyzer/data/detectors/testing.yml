    contentRegex:
      - '(?m)^\s*Describe\s+["''$].*\{'
  confidence: high

# --- PSScriptAnalyzer (line 313): settings file or Invoke-ScriptAnalyzer ---

- id: rackunit
  name: Rackunit
  category: testing
  match:
    contentRegex:
      - '\(require\s+(typed/)?rackunit\b'
      - '\(require\s+[^)]*\brackunit\b'
  confidence: high

- id: bash-bats
  name: Bats
  category: testing
  match:
    extensions: ['.bats']
    contentRegex:
      - '(?m)^#!.*\bbats\b'
      - '(?m)^\s*@test\s'
  confidence: high

- id: bash-shunit2
  name: shUnit2
  category: testing
  match:
    contentRegex:
      - '(?m)^\s*\.\s+\S*shunit2\b'
      - '(?m)^\s*(oneTimeSetUp|oneTimeTearDown)\s*\(\)'
  confidence: high

