# Hand-curated Go web frameworks / ORMs. specfy focuses on SaaS/cloud/db and
# ships few Go application frameworks, so these fill a common gap.
- id: gin
  name: Gin
  category: framework
  match:
    deps:
      - { ecosystem: go, name: github.com/gin-gonic/gin }
  confidence: high

- id: echo
  name: Echo
  category: framework
  match:
    deps:
      - { ecosystem: go, name: github.com/labstack/echo/v4 }
      - { ecosystem: go, name: github.com/labstack/echo }
  confidence: high

