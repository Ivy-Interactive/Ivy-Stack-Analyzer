      - { ecosystem: nuget, prefix: "xunit" }
  confidence: high

- id: nunit
  name: NUnit
  category: testing
  match:
    deps:
      - { ecosystem: nuget, name: "NUnit" }
  confidence: high

- id: mstest
  name: MSTest
  category: testing
  match:
    depPrefix:
      - { ecosystem: nuget, prefix: "MSTest" }
  confidence: high

- id: serilog
  name: Serilog
  category: monitoring
  match:
    depPrefix:
      - { ecosystem: nuget, prefix: "Serilog" }
  confidence: high

- id: mediatr
  name: MediatR
  category: library
  match:
    deps:
      - { ecosystem: nuget, name: "MediatR" }
  confidence: high

- id: automapper
  name: AutoMapper
  category: library
  match:
    deps:
      - { ecosystem: nuget, name: "AutoMapper" }
  confidence: high
