# Hand-curated .NET detectors. specfy is JavaScript-focused and ships no .NET
# rules; these use the MatchSpec superset fields `sdk` and `depPrefix` that
# specfy cannot express (see PLAN.md section 7b).
- id: aspnetcore
  name: ASP.NET Core
  category: framework
  match:
    sdk: ["Microsoft.NET.Sdk.Web"]
    depPrefix:
      - { ecosystem: nuget, prefix: "Microsoft.AspNetCore." }
  confidence: high

- id: blazor
  name: Blazor
  category: framework
  match:
    sdk: ["Microsoft.NET.Sdk.BlazorWebAssembly", "Microsoft.NET.Sdk.Razor"]
    depPrefix:
      - { ecosystem: nuget, prefix: "Microsoft.AspNetCore.Components" }
  supersedes: [aspnetcore]
  confidence: high

- id: efcore
  name: Entity Framework Core
  category: orm
  match:
    depPrefix:
      - { ecosystem: nuget, prefix: "Microsoft.EntityFrameworkCore" }
  confidence: high

- id: dapper
  name: Dapper
  category: orm
  match:
    deps:
      - { ecosystem: nuget, name: "Dapper" }
  confidence: high

- id: maui
  name: .NET MAUI
  category: framework
  match:
    sdk: ["Microsoft.NET.Sdk.Maui"]
    deps:
      - { ecosystem: nuget, name: "Microsoft.Maui.Controls" }
  confidence: high

- id: wpf
  name: WPF
  category: framework
  match:
    pathGlobs: ["**/*.xaml"]
    deps:
      - { ecosystem: nuget, name: "Microsoft.WindowsDesktop.App.WPF" }
  confidence: medium

- id: worker-service
  name: .NET Worker Service
  category: framework
  match:
    sdk: ["Microsoft.NET.Sdk.Worker"]
  confidence: high

# WinForms has no NuGet package and no XAML; its only reliable marker is the
# MSBuild property <UseWindowsForms>true</UseWindowsForms>.
- id: windows-forms
  name: Windows Forms
  category: framework
  match:
    properties:
      - { name: UseWindowsForms, value: "true" }
  confidence: high

- id: avalonia
  name: Avalonia
  category: framework
  match:
    deps:
      - { ecosystem: nuget, name: "Avalonia" }
    depPrefix:
      - { ecosystem: nuget, prefix: "Avalonia." }
  confidence: high

- id: monogame
  name: MonoGame
  category: framework
  match:
    depPrefix:
      - { ecosystem: nuget, prefix: "MonoGame.Framework" }
  confidence: high

- id: elmish
  name: Elmish
  category: framework
  match:
    deps:
      - { ecosystem: nuget, name: "Elmish" }
      - { ecosystem: nuget, name: "Fable.Elmish" }
    depPrefix:
      - { ecosystem: nuget, prefix: "Elmish." }
      - { ecosystem: nuget, prefix: "Fable.Elmish." }
  confidence: high

- id: linqpad
  name: LINQPad
  category: framework
  match:
    deps:
      - { ecosystem: nuget, name: "LINQPad.Runtime" }
      - { ecosystem: nuget, name: "LINQPad" }
  confidence: high

- id: ivy-framework
  name: Ivy Framework
  category: framework
  match:
    deps:
      - { ecosystem: nuget, name: "Ivy" }
      - { ecosystem: nuget, name: "Ivy.Docs.Helpers" }
    depPrefix:
      - { ecosystem: nuget, prefix: "Ivy.Widgets." }
  confidence: high

- id: spectre-console-cli
  name: Spectre.Console.Cli
  category: framework
  match:
    deps:
      - { ecosystem: nuget, name: "Spectre.Console.Cli" }
  confidence: high

- id: xunit
  name: xUnit
  category: testing
  match:
    depPrefix:
      - { ecosystem: nuget, prefix: "xunit" }
  confidence: high

- id: nunit
  name: NUnit
  category: testing
  match:
    deps:
      - { ecosystem: nuget, name: "NUnit" }
  confidence: low      # bare NUnit ref is weak evidence; needs Test.Sdk/adapter to be a real test framework

# The test adapter proves a runnable NUnit suite; promote to high and supersede
# the weak bare-NUnit signal so the `test:` hash slot is populated.
- id: nunit-adapter
  name: NUnit
  category: testing
  match:
    deps:
      - { ecosystem: nuget, name: "NUnit3TestAdapter" }
  supersedes: [nunit]
  confidence: high

- id: mstest
  name: MSTest
  category: testing
  match:
    depPrefix:
      - { ecosystem: nuget, prefix: "MSTest" }
  confidence: high

- id: serilog
  name: Serilog
  category: monitoring
  match:
    depPrefix:
      - { ecosystem: nuget, prefix: "Serilog" }
  confidence: high

- id: mediatr
  name: MediatR
  category: library
  match:
    deps:
      - { ecosystem: nuget, name: "MediatR" }
  confidence: high

- id: automapper
  name: AutoMapper
  category: library
  match:
    deps:
      - { ecosystem: nuget, name: "AutoMapper" }
  confidence: high
