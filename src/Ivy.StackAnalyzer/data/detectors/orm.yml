- id: hibernate
  name: Hibernate
  category: orm
  match:
    deps:
      - { ecosystem: maven, name: "io.quarkus:quarkus-hibernate-orm-panache" }
      - { ecosystem: maven, name: "org.hibernate:hibernate-entitymanager" }
    depPrefix:
      # ORM-specific artifacts only; org.hibernate.validator (Bean Validation) is
      # a separate library and must NOT match.
      - { ecosystem: maven, prefix: "org.hibernate:hibernate-core" }
      - { ecosystem: maven, prefix: "org.hibernate.orm:" }
      - { ecosystem: maven, prefix: "io.quarkus:quarkus-hibernate" }
  confidence: high
