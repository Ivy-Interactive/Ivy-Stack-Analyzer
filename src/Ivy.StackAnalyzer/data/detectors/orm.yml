# Technology detectors (category: orm) seeded from specfy/stack-analyser (MIT).
- id: dieselrs
  name: Diesel
  category: orm
  match:
    deps:
      - { ecosystem: cargo, name: diesel }
  confidence: high
- id: doctrinephp
  name: Doctrine
  category: orm
  match:
    deps:
      - { ecosystem: composer, name: doctrine/orm }
  confidence: high
- id: drizzleorm
  name: Drizzle ORM
