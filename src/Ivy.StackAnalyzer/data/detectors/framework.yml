  confidence: high

# --- Chicken Scheme (runtime) ---------------------------------------------
# .egg files are CHICKEN's egg (package) descriptors.

- id: chicken
  name: Chicken Scheme
  category: framework
  match:
    # A committed `.egg` in a source repo is a CHICKEN egg (an s-expr metadata file);
    # Python `.egg`s are build artifacts that are gitignored/vendored, not committed.
    # `.egg` is not a classified language so its content can't be sampled — hence the
    # extension facet, paired with the CHICKEN import form for egg-less repos.
    extensions: ['.egg']
    contentRegex:
      - '(?m)^\s*\(import\s+\(chicken\b'
  confidence: high

