- id: verilator
  name: Verilator
  category: tool
  match:
    contentRegex:
      # Make var / build artifacts produced by Verilator (not the lint pragma).
      - '\bVERILATOR_[A-Z]'
      - '\bverilated\b'
      # `verilator` as a build target/sim selection or command invocation.
      - '(?m)^\s*verilator\s+[-+\w]'
      - '\bSIM\b[^\n]*\bverilator\b'
  confidence: high

