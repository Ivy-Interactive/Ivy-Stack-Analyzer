  - "(^|/)shCore\\.js$"
  - "(^|/)shLegacy\\.js$"
  - "(^|/)angular([^.]*)\\.js$"
  - "(^|\\/)d3(\\.v\\d+)?([^.]*)\\.js$"
  - "(^|/)react(-[^.]*)?\\.js$"
  - "(^|/)flow-typed/.*\\.js$"
  - "(^|/)modernizr\\-\\d\\.\\d+(\\.\\d+)?\\.js$"
  - "(^|/)modernizr\\.custom\\.\\d+\\.js$"
  - "(^|/)knockout-(\\d+\\.){3}(debug\\.)?js$"
  - "(^|/)docs?/_?(build|themes?|templates?|static)/"
  - "(^|/)admin_media/"
  - "(^|/)env/"
  - "(^|/)fabfile\\.py$"
  - "(^|/)waf$"
  - "(^|/)\\.osx$"
  - \.xctemplate/
  - \.imageset/
  - "(^|/)Carthage/"
  - "(^|/)Sparkle/"
  - "(^|/)Crashlytics\\.framework/"
  - "(^|/)Fabric\\.framework/"
  - "(^|/)BuddyBuildSDK\\.framework/"
  - "(^|/)Realm\\.framework"
  - "(^|/)RealmSwift\\.framework"
  - "(^|/)\\.gitattributes$"
  - "(^|/)\\.gitignore$"
  - "(^|/)\\.gitmodules$"
  - "(^|/)gradlew$"
  - "(^|/)gradlew\\.bat$"
  - "(^|/)gradle/wrapper/"
  - "(^|/)mvnw$"
  - "(^|/)mvnw\\.cmd$"
  - "(^|/)\\.mvn/wrapper/"
  - "-vsdoc\\.js$"
  - \.intellisense\.js$
  - "(^|/)jquery([^.]*)\\.validate(\\.unobtrusive)?\\.js$"
  - "(^|/)jquery([^.]*)\\.unobtrusive\\-ajax\\.js$"
  - "(^|/)[Mm]icrosoft([Mm]vc)?([Aa]jax|[Vv]alidation)(\\.debug)?\\.js$"
  - "(^|/)[Pp]ackages\\/.+\\.\\d+\\/"
  - "(^|/)extjs/.*?\\.js$"
  - "(^|/)extjs/.*?\\.xml$"
  - "(^|/)extjs/.*?\\.txt$"
  - "(^|/)extjs/.*?\\.html$"
  - "(^|/)extjs/.*?\\.properties$"
  - "(^|/)extjs/\\.sencha/"
  - "(^|/)extjs/docs/"
  - "(^|/)extjs/builds/"
  - "(^|/)extjs/cmd/"
  - "(^|/)extjs/examples/"
  - "(^|/)extjs/locale/"
  - "(^|/)extjs/packages/"
  - "(^|/)extjs/plugins/"
  - "(^|/)extjs/resources/"
  - "(^|/)extjs/src/"
  - "(^|/)extjs/welcome/"
  - "(^|/)html5shiv\\.js$"
  - "(^|/)[Tt]ests?/fixtures/"
  - "(^|/)[Ss]pecs?/fixtures/"
  # Jupyter notebooks — output cells (base64 blobs) inflate byte share ~1000x vs code.
  # NOTE: Jupyter Notebook is type=markup, so the prose/data language filter does NOT
  # drop it; this vendor pattern is the only thing that excludes it.
  - "(^|/).*\\.ipynb$"
  # Recorded HTTP fixtures (VCR.py / betamax cassettes) — generated, not source.
  - "(^|/)cassettes/"
  - "(^|/)[Tt]ests?/cassettes/"
  # Generated third-party notices.
  - "(^|/)NOTICES\\.txt$"
  - "(^|/)THIRD[-_]PARTY[-_ ]?NOTICES(\\.[A-Za-z]+)?$"
  # Large generated test-session fixtures (parity with existing testdata/ rules).
  - "(^|/)memory-tests/"
  - "(^|/)perf-tests/"
  - "(^|/)cordova([^.]*)\\.js$"
  - "(^|/)cordova\\-\\d\\.\\d(\\.\\d)?\\.js$"
  - "(^|/)foundation(\\..*)?\\.js$"
  - "(^|/)Vagrantfile$"
  - "(^|/)\\.[Dd][Ss]_[Ss]tore$"
  - "(^|/)inst/extdata/"
  - "(^|/)octicons\\.css"
  - "(^|/)sprockets-octicons\\.scss"
  - "(^|/)activator$"
  - "(^|/)activator\\.bat$"
  - "(^|/)proguard\\.pro$"
  - "(^|/)proguard-rules\\.pro$"
  - "(^|/)puphpet/"
  - "(^|/)\\.google_apis/"
  - "(^|/)Jenkinsfile$"
  - "(^|/)\\.gitpod\\.Dockerfile$"
  # Vendor the .github tree (issue templates, funding, dependabot, docs) EXCEPT
  # the workflows subtree: .github/workflows/ carries real CI signal (GitHub
  # Actions) and must stay visible to InfraScanner and language stats. The
  # trailing "." keeps the bare ".github/" directory from matching so the walker
  # still descends into it (a plain negative-lookahead would prune the whole tree).
  - "(^|/)\\.github/(?!workflows(/|$))."
  - "(^|/)\\.obsidian/"
  - "(^|/)\\.teamcity/"
  - "(^|/)xvba_modules/"
  - "(^|/)\\.git/"
  - "(^|/)build/"
  - "(^|/)bin/"
  - "(^|/)obj/"
  - "(^|/)out/"
  - "(^|/)target/"
  - "(^|/)\\.venv/"
  - "(^|/)venv/"
  - "(^|/)__pycache__/"
  - "(^|/)\\.next/"
  - "(^|/)\\.nuxt/"
  - "(^|/)\\.svelte-kit/"
  - "(^|/)\\.turbo/"
  - "(^|/)\\.cache/"
  - "(^|/)vendor/"
  - "(^|/)\\.idea/"
  - "(^|/)\\.vs/"
  - "(^|/)\\.gradle/"
