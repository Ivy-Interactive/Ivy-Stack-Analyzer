# Vendored / generated path patterns seeded from github-linguist (MIT), plus common build dirs.
# Each entry is a .NET regex tested against forward-slash relative paths.
patterns:
  # Minified / bundled assets — generated, not authored; would inflate JS/CSS shares.
  - "(^|/)[^/]+\\.min\\.(js|css)$"
  # Generated lockfiles — excluded so they do not skew language statistics.
  - "(^|/)package-lock\\.json$"
  - "(^|/)npm-shrinkwrap\\.json$"
  - "(^|/)yarn\\.lock$"
  - "(^|/)pnpm-lock\\.yaml$"
  - "(^|/)bun\\.lockb?$"
  - "(^|/)composer\\.lock$"
  - "(^|/)Gemfile\\.lock$"
  - "(^|/)poetry\\.lock$"
  - "(^|/)Pipfile\\.lock$"
  - "(^|/)uv\\.lock$"
  - "(^|/)pdm\\.lock$"
  - "(^|/)Cargo\\.lock$"
  - "(^|/)go\\.sum$"
  - "(^|/)packages\\.lock\\.json$"
  - "(^|/)cache/"
  - "^[Dd]ependencies/"
  - "(^|/)dist/"
  - ^deps/
  - "(^|/)configure$"
  - "(^|/)config\\.guess$"
  - "(^|/)config\\.sub$"
  - "(^|/)aclocal\\.m4"
  - "(^|/)libtool\\.m4"
  - "(^|/)ltoptions\\.m4"
  - "(^|/)ltsugar\\.m4"
  - "(^|/)ltversion\\.m4"
  - "(^|/)lt~obsolete\\.m4"
  - "(^|/)dotnet-install\\.(ps1|sh)$"
  - "(^|/)cpplint\\.py"
  - "(^|/)node_modules/"
  - "(^|/)\\.yarn/releases/"
  - "(^|/)\\.yarn/plugins/"
  - "(^|/)\\.yarn/sdks/"
  - "(^|/)\\.yarn/versions/"
  - "(^|/)\\.yarn/unplugged/"
  - "(^|/)_esy$"
  - "(^|/)bower_components/"
  - ^rebar$
  - "(^|/)erlang\\.mk"
  - "(^|/)Godeps/_workspace/"
  - "(^|/)testdata/"
  - "(^|/)\\.indent\\.pro"
  - "(\\.|-)min\\.(js|css)$"
  - "([^\\s]*)import\\.(css|less|scss|styl)$"
  - "(^|/)bootstrap([^/.]*)(\\..*)?\\.(js|css|less|scss|styl)$"
  - "(^|/)custom\\.bootstrap([^\\s]*)(js|css|less|scss|styl)$"
  - "(^|/)font-?awesome\\.(css|less|scss|styl)$"
  - "(^|/)font-?awesome/.*\\.(css|less|scss|styl)$"
  - "(^|/)foundation\\.(css|less|scss|styl)$"
  - "(^|/)normalize\\.(css|less|scss|styl)$"
  - "(^|/)skeleton\\.(css|less|scss|styl)$"
  - "(^|/)[Bb]ourbon/.*\\.(css|less|scss|styl)$"
  - "(^|/)animate\\.(css|less|scss|styl)$"
  - "(^|/)materialize\\.(css|less|scss|styl|js)$"
  - "(^|/)select2/.*\\.(css|scss|js)$"
  - "(^|/)bulma\\.(css|sass|scss)$"
  - "(3rd|[Tt]hird)[-_]?[Pp]arty/"
  - "(^|/)vendors?/"
  - "(^|/)[Ee]xtern(als?)?/"
  - "(^|/)[Vv]+endor/"
  - ^debian/
  - "(^|/)run\\.n$"
  - "(^|/)bootstrap-datepicker/"
  - "(^|/)jquery([^.]*)\\.js$"
  - "(^|/)jquery\\-\\d\\.\\d+(\\.\\d+)?\\.js$"
  - "(^|/)jquery\\-ui(\\-\\d\\.\\d+(\\.\\d+)?)?(\\.\\w+)?\\.(js|css)$"
  - "(^|/)jquery\\.(ui|effects)\\.([^.]*)\\.(js|css)$"
  - "(^|/)jquery\\.fn\\.gantt\\.js"
  - "(^|/)jquery\\.fancybox\\.(js|css)"
  - "(^|/)fuelux\\.js"
  - "(^|/)jquery\\.fileupload(-\\w+)?\\.js$"
  - "(^|/)jquery\\.dataTables\\.js"
  - "(^|/)bootbox\\.js"
  - "(^|/)pdf\\.worker\\.js"
