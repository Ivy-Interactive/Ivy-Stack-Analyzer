name: Release

# Publishes two packages to nuget.org via NuGet Trusted Publishing (OIDC — no
# long-lived API key):
#   - Ivy.StackAnalyzer    (class library)
#   - ivy-stack-analyzer   (.NET tool: `dotnet tool install -g ivy-stack-analyzer`)
#
# Each package id needs its own Trusted Publishing policy on nuget.org under the
# owner account, pointing at this repository and this workflow file (release.yml).
# Triggered by publishing a GitHub Release (tag like v1.0.1) or manually.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.0.1)'
        required: true
        default: '1.0.1'

permissions:
  id-token: write   # required to mint a short-lived NuGet key via OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            v="${{ github.event.release.tag_name }}"
            v="${v#v}"
          else
            v="${{ github.event.inputs.version }}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Publishing version $v"

      - name: Restore
        run: dotnet restore Ivy.StackAnalyzer.slnx

      - name: Build
        run: dotnet build Ivy.StackAnalyzer.slnx -c Release --no-restore -p:Version=${{ steps.ver.outputs.version }}

      - name: Test
        run: dotnet test Ivy.StackAnalyzer.slnx -c Release --no-build

      - name: Pack
        run: |
          dotnet pack src/Ivy.StackAnalyzer/Ivy.StackAnalyzer.csproj \
            -c Release --no-build -o artifacts -p:Version=${{ steps.ver.outputs.version }}
          dotnet pack src/Ivy.StackAnalyzer.Console/Ivy.StackAnalyzer.Console.csproj \
            -c Release --no-build -o artifacts -p:Version=${{ steps.ver.outputs.version }}

      - name: NuGet trusted-publishing login
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: Ivy-Interactive   # the nuget.org account that owns the packages/policies

      - name: Push to nuget.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Upload packages as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: artifacts/*
